<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ludo King</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e8edf5;font-family:Inter,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.header{display:flex;gap:16px;margin-bottom:16px;background:#111827;padding:12px 24px;border-radius:12px}
.score-box{font-size:.9rem}
canvas{border-radius:12px;box-shadow:0 0 30px rgba(124,58,237,.3);max-width:100%}
.controls{margin-top:16px;display:flex;flex-direction:column;align-items:center;gap:12px;background:#111827;padding:20px;border-radius:12px;min-width:160px}
.dice{font-size:3rem;cursor:pointer;user-select:none;transition:transform .15s}
.dice:hover{transform:scale(1.15)}
#diceResult{font-size:1rem;font-weight:700;color:#FFD700}
#turnIndicator{font-weight:700;font-size:.95rem;padding:8px 16px;border-radius:20px;background:#1a2236}
#statusMsg{font-size:.82rem;color:#6B7280;text-align:center;min-height:20px}
.restart-btn{background:linear-gradient(135deg,#7C3AED,#00F5FF);color:#fff;border:none;padding:10px 24px;border-radius:20px;font-weight:700;cursor:pointer}
.ludo-wrap{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>
<div class="header">
  <span style="font-weight:700">🎲 Ludo King</span>
  <div class="score-box">Score: <span id="score" style="color:#FFD700;font-weight:700">0</span></div>
  <div class="score-box">Turn: <span id="turnDisplay" style="color:#00F5FF;font-weight:700">Red</span></div>
</div>
<div class="ludo-wrap">
  <canvas id="ludoCanvas" width="420" height="420"></canvas>
  <div class="controls">
    <div id="dice" class="dice" onclick="rollDice()">🎲</div>
    <p id="diceResult">Click to roll</p>
    <div class="turn-indicator" id="turnIndicator">🔴 Red's Turn</div>
    <div id="statusMsg"></div>
    <button class="restart-btn" onclick="restartGame()">🔄 Restart</button>
  </div>
</div>
<script src="ludo.js"></script>
</body>
</html>
