<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Candy Crush Blast</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e8edf5;font-family:Inter,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.header{display:flex;gap:20px;margin-bottom:16px;background:#111827;padding:12px 24px;border-radius:12px}
.score-box{font-size:.9rem}span{color:#FFD700;font-weight:700}
.board{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;background:#111827;padding:12px;border-radius:16px;box-shadow:0 0 30px rgba(124,58,237,.3)}
.cell{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;transition:transform .12s;user-select:none}
.cell:hover{transform:scale(1.15)}
.cell.selected{box-shadow:0 0 0 3px #00F5FF;transform:scale(1.15)}
.controls{margin-top:16px;display:flex;flex-direction:column;align-items:center;gap:12px}
#statusMsg{color:#FFD700;font-weight:600;min-height:24px;font-size:.9rem}
.restart-btn{background:linear-gradient(135deg,#7C3AED,#00F5FF);color:#fff;border:none;padding:10px 24px;border-radius:20px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="header">
  <div class="score-box">🧩 Candy Blast</div>
  <div class="score-box">Score: <span id="score">0</span></div>
  <div class="score-box">Moves: <span id="moves">30</span></div>
  <div class="score-box">Level: <span id="level">1</span></div>
</div>
<div id="board" class="board"></div>
<div class="controls">
  <div id="statusMsg"></div>
  <button class="restart-btn" onclick="restartGame()">🔄 New Game</button>
</div>
<script>
const COLS=8,ROWS=8;
const CANDIES=['🍎','🍊','🍋','🍇','🍓','🫐','🍬','💎'];
let grid=[],selected=null,score=0,moves=30,level=1,busy=false;

function initGrid(){
  grid=Array.from({length:ROWS},()=>Array.from({length:COLS},()=>CANDIES[Math.floor(Math.random()*CANDIES.length)]));
  renderBoard();
}

function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    cell.textContent=grid[r][c]||'';
    cell.style.background=grid[r][c]?`hsl(${(CANDIES.indexOf(grid[r][c])+1)*40},70%,25%)`:'transparent';
    if(selected&&selected.r===r&&selected.c===c)cell.classList.add('selected');
    cell.addEventListener('click',()=>onCellClick(r,c));
    board.appendChild(cell);
  }
}

function onCellClick(r,c){
  if(busy||moves<=0)return;
  if(!selected){selected={r,c};renderBoard();return;}
  const dr=Math.abs(r-selected.r),dc=Math.abs(c-selected.c);
  if((dr===1&&dc===0)||(dr===0&&dc===1)){
    [grid[selected.r][selected.c],grid[r][c]]=[grid[r][c],grid[selected.r][selected.c]];
    moves--;document.getElementById('moves').textContent=moves;
    selected=null;
    setTimeout(()=>{const m=findMatches();if(m.length){busy=true;clearMatches(m);}else{[grid[r][c],grid[selected?.r??r][selected?.c??c]]=[grid[selected?.r??r][selected?.c??c],grid[r][c]];renderBoard();}},100);
  }else{selected={r,c};}
  renderBoard();
}

function findMatches(){
  const matched=new Set();
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS-2;c++)if(grid[r][c]&&grid[r][c]===grid[r][c+1]&&grid[r][c]===grid[r][c+2]){let k=c;while(k<COLS&&grid[r][k]===grid[r][c])matched.add(`${r},${k++}`);}
  for(let r=0;r<ROWS-2;r++)for(let c=0;c<COLS;c++)if(grid[r][c]&&grid[r][c]===grid[r+1][c]&&grid[r][c]===grid[r+2][c]){let k=r;while(k<ROWS&&grid[k][c]===grid[r][c])matched.add(`${k++},${c}`);}
  return[...matched].map(s=>{const[r,c]=s.split(',');return{r:+r,c:+c};});
}

function clearMatches(matched){
  matched.forEach(({r,c})=>grid[r][c]=null);
  score+=matched.length*10*level;
  document.getElementById('score').textContent=score;
  renderBoard();
  setTimeout(()=>{
    for(let c=0;c<COLS;c++){let e=ROWS-1;for(let r=ROWS-1;r>=0;r--)if(grid[r][c]){grid[e][c]=grid[r][c];if(e!==r)grid[r][c]=null;e--;}}
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!grid[r][c])grid[r][c]=CANDIES[Math.floor(Math.random()*CANDIES.length)];
    renderBoard();
    setTimeout(()=>{const n=findMatches();if(n.length)clearMatches(n);else{busy=false;if(score>=level*500){level++;document.getElementById('level').textContent=level;moves+=15;document.getElementById('moves').textContent=moves;}if(moves<=0){document.getElementById('statusMsg').textContent='🏆 Game Over! Score: '+score;window.parent?.postMessage({type:'GAME_OVER',score,result:score>=500?'win':'loss'},'*');}}},300);
  },280);
}

function restartGame(){score=0;moves=30;level=1;selected=null;busy=false;document.getElementById('score').textContent='0';document.getElementById('moves').textContent='30';document.getElementById('level').textContent='1';document.getElementById('statusMsg').textContent='';initGrid();}

initGrid();
</script>
</body>
</html>
