<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Neon Runner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e8edf5;font-family:Inter,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.header{display:flex;gap:20px;margin-bottom:12px;background:#111827;padding:12px 24px;border-radius:12px}
.score-box{font-size:.9rem}span{color:#00F5FF;font-weight:700}
.canvas-wrap{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 0 30px rgba(0,245,255,.3)}
canvas{display:block}
.overlay{position:absolute;inset:0;background:rgba(10,14,26,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.overlay h2{font-size:1.8rem}
.overlay p{color:#6B7280;text-align:center}
#startBtn{background:linear-gradient(135deg,#7C3AED,#00F5FF);color:#fff;border:none;padding:14px 36px;border-radius:20px;font-weight:700;font-size:1rem;cursor:pointer}
.hint{font-size:.78rem;color:#6B7280}
</style>
</head>
<body>
<div class="header">
  <div class="score-box">🏃 Neon Runner</div>
  <div class="score-box">Score: <span id="score">0</span></div>
  <div class="score-box">Best: <span id="best">0</span></div>
</div>
<div class="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="overlay" class="overlay">
    <h2>🏃 Neon Runner</h2>
    <p>Dodge obstacles. Survive!</p>
    <button id="startBtn" onclick="startGame()">▶ Start</button>
    <p class="hint">Space / Tap to Jump</p>
  </div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=360,H=200;
canvas.width=W;canvas.height=H;

let score=0,best=0,speed=4,frame=0,running=false,animId;
const player={x:60,y:H-50,w:32,h:40,vy:0,grounded:true,
  jump(){if(this.grounded){this.vy=-12;this.grounded=false;}},
  update(){this.vy+=0.65;this.y+=this.vy;if(this.y>=H-50){this.y=H-50;this.vy=0;this.grounded=true;}},
  draw(){ctx.shadowBlur=12;ctx.shadowColor='#00F5FF';ctx.fillStyle='#00F5FF';ctx.fillRect(this.x,this.y,this.w,this.h);ctx.fillStyle='#7C3AED';ctx.fillRect(this.x+4,this.y+6,24,10);ctx.shadowBlur=0;}
};
let obstacles=[],stars=Array.from({length:40},()=>({x:Math.random()*W,y:Math.random()*(H-40),s:Math.random()*1.5+.5,sp:Math.random()+.3}));

function loop(){
  if(!running)return;
  animId=requestAnimationFrame(loop);
  frame++;
  ctx.fillStyle='#050810';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,.4)';
  stars.forEach(s=>{s.x-=s.sp*speed/4;if(s.x<0)s.x=W;ctx.fillRect(s.x,s.y,s.s,s.s);});
  ctx.fillStyle='#1a2236';ctx.fillRect(0,H-10,W,10);
  ctx.strokeStyle='#00F5FF';ctx.lineWidth=1.5;ctx.shadowBlur=8;ctx.shadowColor='#00F5FF';
  ctx.beginPath();ctx.moveTo(0,H-10);ctx.lineTo(W,H-10);ctx.stroke();ctx.shadowBlur=0;
  player.update();player.draw();
  if(frame%Math.max(45,80-Math.floor(score/300))===0){
    const h=25+Math.random()*45;
    obstacles.push({x:W,y:H-h-10,w:18+Math.random()*16,h});
  }
  obstacles=obstacles.filter(o=>o.x+o.w>0);
  obstacles.forEach(o=>{
    o.x-=speed;
    ctx.shadowBlur=10;ctx.shadowColor='#FF4757';ctx.fillStyle='#FF4757';
    ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(o.x+o.w/2,o.y-14);ctx.lineTo(o.x+o.w,o.y);ctx.fill();
    ctx.shadowBlur=0;
    if(player.x+player.w-6>o.x+4&&player.x+6<o.x+o.w-4&&player.y+player.h-4>o.y)endGame();
  });
  score++;
  if(score%150===0)speed=Math.min(speed+.4,13);
  document.getElementById('score').textContent=score;
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  score=0;speed=4;frame=0;obstacles=[];
  player.y=H-50;player.vy=0;player.grounded=true;
  running=true;loop();
}

function endGame(){
  running=false;cancelAnimationFrame(animId);
  if(score>best){best=score;document.getElementById('best').textContent=best;}
  const ov=document.getElementById('overlay');
  ov.querySelector('h2').textContent='💥 Game Over!';
  ov.querySelector('p').textContent='Score: '+score+' | Best: '+best;
  ov.querySelector('button').textContent='▶ Play Again';
  ov.style.display='flex';
  window.parent?.postMessage({type:'GAME_OVER',score,result:score>=500?'win':'loss'},'*');
}

document.addEventListener('keydown',e=>{if(['Space','ArrowUp'].includes(e.code)){e.preventDefault();if(running)player.jump();}});
canvas.addEventListener('click',()=>{if(running)player.jump();});
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(running)player.jump();},{passive:false});
</script>
</body>
