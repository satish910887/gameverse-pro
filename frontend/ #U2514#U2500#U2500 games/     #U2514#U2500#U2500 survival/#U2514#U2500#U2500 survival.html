<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GameVerse Pro - Survival</title>

<link rel="stylesheet" href="survival.css">

</head>

<body>

<div class="game-container">

<header class="top-bar">

<h1>🛡 Survival Arena</h1>

<div id="gameStatus">

Ready

</div>

</header>

<main>

<canvas
id="gameCanvas"
width="900"
height="500">
</canvas>

</main>

<section class="hud">

<div>

❤️ Health

<span id="health">

100

</span>

</div>

<div>

⭐ Score

<span id="score">

0

</span>

</div>

<div>

⏱ Time

<span id="time">

00:00

</span>

</div>

</section>

<section class="controls">

<button id="startBtn">

▶ Start

</button>

<button id="restartBtn">

🔄 Restart

</button>

<button id="exitBtn">

❌ Exit

</button>

</section>

<div class="instructions">

<p>

⌨ Move:
<strong>W A S D</strong>
or
<strong>Arrow Keys</strong>

</p>

<p>

🖱 Click to attack enemies.

</p>

</div>

</div>

<script src="../shared/gamebridge.js"></script>

<script src="../shared/physics.js"></script>

<script src="survival.js"></script>

</body>

</html>
