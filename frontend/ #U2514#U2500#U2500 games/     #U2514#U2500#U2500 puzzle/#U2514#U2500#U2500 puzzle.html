<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GameVerse Pro - Puzzle</title>

<link rel="stylesheet" href="puzzle.css">

</head>

<body>

<div class="game-container">

    <header class="top-bar">

        <h1>🧩 Puzzle Challenge</h1>

        <div id="gameStatus">

            Time: <span id="timer">00:00</span>

        </div>

    </header>

    <main>

        <div id="puzzleBoard">

            <!-- Tiles generated by puzzle.js -->

        </div>

    </main>

    <section class="game-info">

        <div>

            Moves:
            <span id="moveCount">0</span>

        </div>

        <div>

            Score:
            <span id="score">0</span>

        </div>

    </section>

    <section class="controls">

        <button id="shuffleBtn">

            🔀 Shuffle

        </button>

        <button id="restartBtn">

            🔄 Restart

        </button>

        <button id="exitBtn">

            ❌ Exit

        </button>

    </section>

</div>

<script src="../shared/gamebridge.js"></script>

<script src="../shared/physics.js"></script>

<script src="puzzle.js"></script>

</body>

</html>
